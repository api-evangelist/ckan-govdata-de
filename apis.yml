apis:
  - aid: ckan-govdata-de:catalog
    name: GovData Germany CKAN Action API
    description: >-
      CKAN Action API for GovData Germany, a consistent JSON-over-HTTP interface over a catalog of 151,707 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://ckan.govdata.de/api/3/action/.
    humanURL: https://ckan.govdata.de
    baseURL: https://ckan.govdata.de/api/3/action
